<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servidor de PDF</title>
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <h1>Servidor de PDF</h1>
        <p>Selecciona un PDF:</p>
        <form action="/ver-pdf" method="get">
            <label for="pdfPath">Ruta del PDF:</label>
            <input type="text" id="pdfPath" name="David Maratrat.pdf" placeholder="Ruta del PDF" required>
            <br>
            <button type="submit">Ver PDF</button>
        </form>
    </div>
</body>
</html>
