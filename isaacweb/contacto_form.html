        <br>
        <form id="formContacto">
        <fieldset>
            <legend>Formulario Contacto</legend>
        <table id="tabla_contacto">
            <tbody>
                <tr>
                    <td>
                        <input type="text" class="estilo1" name="formContacto" id="nombre" placeholder="Nombre">
                    </td>
                    <td>
                        <input type="number" class="estilo1" name="formContacto" id="tlf" placeholder="Teléfono">
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <input type="text" class="estilo1" name="formContacto" id="correo" size="50" placeholder="Correo">
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <label>Mensaje</label>
                        <br>
                            <textarea name="formContacto" class="estilo1" id="intereses" rows="4" cols="50"></textarea>
                        <br>
                    </td>
                </tr>
            </tbody>
        </table>
        <div>
            <input type="checkbox" name="formContacto" id="terminos">
            <label>Acepto los términos y condiciones</label>
        </div>
            <div>
                <input type="submit" name="formContacto" id="enviarForm">
                <input type="reset" name="formContacto" id="resetForm">
            </div>
        </fieldset>
        </form>
